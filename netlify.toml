[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[functions]
  # Quitamos el node_bundle = true que dio error
  # Netlify ahora detecta automáticamente si debe buildear con esbuild
  directory = "netlify/functions"

# Si necesitamos externalizar módulos, se hace así, pero por ahora dejamos vacio
[functions.node_bundle]
  external_node_modules = []

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security headers for every response.
# NOTE: CORS headers were previously wildcarded (Access-Control-Allow-Origin = "*")
# on every path — including /api/*. That allowed any website to invoke our
# Netlify Functions with a user's Firebase ID token if it could obtain one.
# We now rely on same-origin requests (the frontend is served from the same
# Netlify site). If cross-origin access is ever needed it must be scoped
# per-function and per-origin, not wildcarded site-wide.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
