<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Procesando pago · Camino del Amor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="css/procesando.css">
</head>
<body>

  <div class="card">
    <div class="seal">
      <div class="ring"></div>
      <div class="ring s"></div>
      <div class="inner">✦</div>
    </div>

    <h1>Activando tu <em>membresía</em>…</h1>
    <p class="subtitle">
      Estamos verificando tu pago con Mercado Pago.<br/>
      Esto solo toma unos segundos.
    </p>

    <div class="progress-track">
      <div class="progress-fill" id="pFill"></div>
    </div>
    <p class="status-msg" id="statusMsg">Conectando con el servidor…</p>

    <div class="error-state" id="errorState">
      <p id="errorMsg">No pudimos verificar tu pago. Si ya fue cobrado, escríbenos.</p>
      <a href="/" class="btn-back">Volver al inicio</a>
    </div>
  </div>

  <script src="js/procesando.js"></script>
</body>
</html>
