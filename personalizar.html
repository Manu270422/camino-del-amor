<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Personaliza tu carta · Camino del Amor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Jost&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/personalizar.css">
</head>

<body>

  <header class="header">
    <a href="index.html" class="logo-link">
      <img src="./El Mundo de Manu.png" alt="Camino del Amor" class="header-logo">
    </a>

    <div class="header-actions">
      <button class="btn-outline" onclick="window.location.href='index.html'">
        Cerrar
      </button>
    </div>
  </header>

  <div class="stepper">
    <div class="step active">1. Inicio</div>
    <div class="step">2. Capítulos</div>
    <div class="step">3. Final</div>
    <div class="step">4. Música</div>
    <div class="step">5. Preview</div>
  </div>

  <main class="main-container">

    <aside class="sidebar">
      <div class="sidebar-top">
        <h2 class="sidebar-title">Capítulos</h2>
        <p class="sidebar-desc">Organiza tu historia por partes</p>
      </div>

      <div class="chapter-list" id="chapter-list"></div>

      <button class="btn-add-chapter" onclick="if(typeof addChapter === 'function') addChapter()">
        <span class="icon">+</span> Agregar capítulo
      </button>
    </aside>

    <section class="editor-area">
      
      <div id="editor-empty" class="editor-empty">
        <div class="empty-state">
          <div class="empty-icon">✍️</div>
          <p>Tu historia empieza aquí...</p>
          <span>Selecciona o crea un capítulo para comenzar 💌</span>
        </div>
      </div>

      <div id="editor-content" class="editor-content" style="display:none;">
        <div class="editor-header">
          <input type="text" id="chapter-title" class="input-title" placeholder="Título del capítulo...">
          <button class="btn-delete" onclick="if(typeof deleteCurrentChapter === 'function') deleteCurrentChapter()">
            🗑️
          </button>
        </div>

        <div class="field-group">
          <label class="label">Contenido de la carta</label>
          <textarea id="chapter-body" class="input-textarea" placeholder="Escribe aquí tus sentimientos..."></textarea>
          <div class="live-preview" id="live-preview"></div>
        </div>

        <div class="field-group">
          <label class="label">Foto del capítulo</label>
          <div class="upload-container">
            <input type="file" id="file-uploader" accept="image/*" style="display:none;">
            <button type="button" class="btn-upload" onclick="document.getElementById('file-uploader').click()">
              <span>📸</span> Adjuntar momento especial
            </button>
            <div id="upload-status" class="upload-status"></div>
            <div id="image-preview" class="image-preview"></div>
            <input type="hidden" id="photoUrl" name="photoUrl">
          </div>
        </div>

        <div class="field-group">
          <label class="label">Video (opcional)</label>
          <input type="url" id="chapter-video" class="input-text" placeholder="Link de YouTube o video">
        </div>
      </div>
    </section>

    <aside class="config-bar">
      <h3 class="config-title">Configuración</h3>

      <div class="field-group">
        <label class="label">Dedicado a</label>
        <input type="text" id="target-name" class="input-text" placeholder="Nombre de esa persona">
      </div>

      <div class="field-group">
        <label class="label">Mensaje final 💌</label>
        <textarea id="final-message" class="input-textarea" placeholder="Escribe el cierre de tu carta..."></textarea>
      </div>

      <div class="field-group">
        <label class="label">Música (archivo)</label>
        <input type="file" id="music-file" accept="audio/*">
      </div>

      <button class="btn-upload" onclick="previewStory()" style="margin-bottom: 15px; width: 100%;">
        👁️ Previsualizar carta
      </button>

      <div class="finish-zone">
        <div id="status-msg" style="margin-bottom: 10px;"></div>
        <button class="btn-finish" id="btn-publish" onclick="publishStory()">
          <span>Publicar carta</span>
          <div class="spinner" style="display: none;"></div>
        </button>
        <p class="finish-note">Tu carta será privada y única.</p>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script src="js/personalizar.js" defer></script>
  <script src="js/payment.js"></script>

  <script>
    // 👁️ Función para disparar la previsualización en otra pestaña
    // Guardo temporalmente los datos y abro el index simulando la vista final
    window.previewStory = function() {
      const data = {
        name: document.getElementById('target-name').value,
        finalMessage: document.getElementById('final-message').value
      };
      localStorage.setItem('previewData', JSON.stringify(data));
      window.open('index.html?preview=true', '_blank');
    };

    // 🚀 Lógica de publicación del SaaS
    // Aquí recopilo todo lo que el usuario escribió para mandarlo a la base de datos
    window.publishStory = async function() {
      const btn = document.getElementById('btn-publish');
      const chapters = (typeof window.getChapters === 'function') ? window.getChapters() : [];

      const storyData = {
        recipientName: document.getElementById('target-name')?.value.trim() || '',
        senderName: window.currentUser?.displayName || 'Anónimo',
        message: chapters.map(ch => ch.body).join('\n\n') || '',
        finalMessage: document.getElementById('final-message')?.value || '',
        musicFile: document.getElementById('music-file')?.files[0] || null,
        photoUrl: document.getElementById('photoUrl')?.value || '',
        chapters: chapters,
      };

      // Validación: Si no puso nombre o no escribió nada, lo detengo
      if (!storyData.recipientName || (!storyData.message && !storyData.finalMessage)) {
        alert('Completa el nombre y escribe al menos un mensaje 💌');
        return;
      }

      // Animación de carga en el botón para que sepa que la app está pensando
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Publicando...';
      btn.querySelector('.spinner').style.display = 'inline-block';

      try {
        if (window.generarCarta) await window.generarCarta(storyData);
      } catch (err) {
        console.error(err);
      } finally {
        // Devuelvo el botón a la normalidad termine bien o mal
        btn.disabled = false;
        btn.querySelector('span').textContent = 'Publicar carta';
        btn.querySelector('.spinner').style.display = 'none';
      }
    };
  </script>

  <script>
    // =========================================================
    // 💾 SISTEMA DE AUTOGUARDADO LOCAL (Anti-desastres)
    // =========================================================
    
    // Le digo al navegador: "Oye, cuando cargues todo el HTML, ejecuta esta función"
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Busco y guardo en variables los dos inputs que quiero proteger
      const inputName = document.getElementById('target-name');
      const inputFinalMsg = document.getElementById('final-message');

      // 2. RECUPERAR: Pregunto si ya hay algo guardado en el navegador de visitas anteriores
      // Si el usuario recargó la página, esto devuelve el texto a su lugar correspondiente
      if (localStorage.getItem('cda_draft_name')) {
        inputName.value = localStorage.getItem('cda_draft_name');
      }
      if (localStorage.getItem('cda_draft_final_msg')) {
        inputFinalMsg.value = localStorage.getItem('cda_draft_final_msg');
      }

      // 3. GUARDAR EN TIEMPO REAL: Le pongo un "espía" (Event Listener) a cada input
      // Cada vez que el usuario teclea ('input'), lo guardo inmediatamente en el localStorage
      inputName.addEventListener('input', () => {
        localStorage.setItem('cda_draft_name', inputName.value);
      });
      
      inputFinalMsg.addEventListener('input', () => {
        localStorage.setItem('cda_draft_final_msg', inputFinalMsg.value);
      });
      
      // Mensajito oculto en la consola para saber que mi magia oscura está funcionando
      console.log("🟢 Autoguardado activado. Configuración a salvo.");
    });
  </script>

</body>
</html>
