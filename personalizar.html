<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Personaliza tu carta · Camino del Amor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <link rel="stylesheet" href="css/personalizar.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">Camino del Amor</a>
    <div class="header-actions">
      <button class="btn-outline" onclick="window.location.href='index.html'">Cerrar</button>
    </div>
  </header>

  <main class="main-container">
    <aside class="sidebar">
      <div class="sidebar-top">
        <h2 class="sidebar-title">Capítulos</h2>
        <p class="sidebar-desc">Organiza tu historia por partes</p>
      </div>
      <div class="chapter-list" id="chapter-list"></div>
      <button class="btn-add-chapter" onclick="addChapter()">
        <span class="icon">+</span> Agregar capítulo
      </button>
    </aside>

    <section class="editor-area">
      <div id="editor-empty" class="editor-empty">
        <p>Selecciona un capítulo para empezar a escribir...</p>
      </div>

      <div id="editor-content" class="editor-content" style="display:none;">
        <div class="editor-header">
          <input type="text" id="chapter-title" class="input-title" placeholder="Título del capítulo...">
          <button class="btn-delete" onclick="deleteCurrentChapter()">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
          </button>
        </div>

        <div class="field-group">
          <label class="label">Contenido de la carta</label>
          <textarea id="chapter-body" class="input-textarea" placeholder="Escribe aquí tus sentimientos..."></textarea>
        </div>

        <div class="media-grid">
          <div class="field-group">
            <label class="label">Link de imagen (Pinterest/Directo)</label>
            <input type="url" id="chapter-img" class="input-text" placeholder="https://ejemplo.com/foto.jpg">
          </div>
          <div class="field-group">
            <label class="label">Link de video (opcional)</label>
            <input type="url" id="chapter-video" class="input-text" placeholder="Link de YouTube o Video directo">
          </div>
        </div>
      </div>
    </section>

    <aside class="config-bar">
      <h3 class="config-title">Configuración</h3>
      
      <div class="field-group">
        <label class="label">Música (YouTube URL)</label>
        <input type="url" id="music-url" class="input-text" placeholder="https://youtube.com/...">
      </div>

      <div class="field-group">
        <label class="label">Dedicado a</label>
        <input type="text" id="target-name" class="input-text" placeholder="Nombre de esa persona">
      </div>

      <div class="finish-zone">
        <div id="status-msg" style="margin-bottom: 10px; font-size: 0.9em; min-height: 1.2em;"></div>
        
        <button class="btn-finish" id="btn-publish" onclick="publishStory()">
          <span>Publicar carta</span>
          <div class="spinner"></div>
        </button>
        <p class="finish-note">Tu carta será privada y única.</p>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/personalizar.js"></script>

  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, doc,
             setDoc, getDoc,
             collection }       from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
    import { getAuth,
             onAuthStateChanged,
             GoogleAuthProvider,
             signInWithPopup,
             signOut }          from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBGLTxv2ozPcXwLPjrDDL7UilGh7cBTM8w",
      authDomain:        "caminodelamor-270422.firebaseapp.com",
      projectId:         "caminodelamor-270422",
      storageBucket:     "caminodelamor-270422.firebasestorage.app",
      messagingSenderId: "382407116447",
      appId:             "1:382407116447:web:0b8eb1f283fde40f1644aa"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    window.db                 = db;
    window.auth               = auth;
    window.GoogleAuthProvider = GoogleAuthProvider;
    window.signInWithPopup    = signInWithPopup;
    window.signOut            = signOut;
    window.doc                = doc;
    window.getDoc             = getDoc;
    window.setDoc             = setDoc;
    window.collection         = collection;

    onAuthStateChanged(auth, async (user) => {
      if (window.verificarMembresia) await window.verificarMembresia(user);
    });

    console.log("✅ Firebase activo en personalizar.html");
  </script>

  <script src="js/payment.js"></script>

  <script>
    window.publishStory = async function() {
      const btn = document.getElementById('btn-publish');
      const status = document.getElementById('status-msg');

      const chapters = (typeof window.getChapters === 'function')
        ? window.getChapters()
        : [];

      const storyData = {
        recipientName: document.getElementById('target-name')?.value.trim() || '',
        senderName:     window.currentUser?.displayName || 'Anónimo',
        occasion:       'amor',
        message:        chapters.map(ch => ch.body).join('\n\n') || '',
        song:           document.getElementById('music-url')?.value.trim() || '',
        photoUrl:       chapters[0]?.img || '',
        chapters:       chapters,
      };

      if (!storyData.recipientName) {
        alert('Escribe el nombre de esa persona especial 💌');
        return;
      }

      if (!storyData.message) {
        alert('Agrega al menos un capítulo con texto 📝');
        return;
      }

      if (btn) {
        btn.disabled = true;
        btn.querySelector('span').textContent = 'Publicando...';
        btn.querySelector('.spinner').style.display = 'inline-block';
      }

      try {
        if (window.generarCarta) {
          await window.generarCarta(storyData);
        } else {
          alert('Error: payment.js no se cargó correctamente.');
          if (btn) {
            btn.disabled = false;
            btn.querySelector('span').textContent = 'Publicar carta';
            btn.querySelector('.spinner').style.display = 'none';
          }
        }
      } catch (err) {
        console.error('Error en publishStory:', err);
        if (btn) {
          btn.disabled = false;
          btn.querySelector('span').textContent = 'Publicar carta';
          btn.querySelector('.spinner').style.display = 'none';
        }
      }
    };
  </script>

</body>
</html>
